<svg viewBox="0 0 200 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Parallel Perspective — The Open Eye mark (variant D, LOCKED) -->
  <!-- Direction A "warm resolved" palette (2026-07-11 review) -->
  <!-- Top circle: Ink Charcoal #1C1813 | Bottom circle: Burnt Sienna #96462A | Pupil: Ink Charcoal -->
  <!-- Geometry: r=90, centre offset d=60 (d/r=2/3), pupil r=13 -->
  <!-- Dark bg variant: top circle stays Ink Charcoal (fades into dark field) -->
  <!-- bottom circle stays Sienna (the revealing element) -->
  <!-- pupil stays Ink Charcoal — subtle against dark bg -->
  <circle cx="100" cy="100" r="90" stroke="#1C1813" stroke-width="5.5" fill="none"/>
  <circle cx="100" cy="160" r="90" stroke="#96462A" stroke-width="5.5" fill="none"/>
  <circle cx="100" cy="130" r="13" fill="#1C1813"/>
</svg>